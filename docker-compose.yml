services:

  zookeeper:
    image: confluentinc/cp-zookeeper:7.4.0
    container_name: kafka-zookeeper
    networks:
      - broker-kafka

    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000

    healthcheck:
      test: ["CMD-SHELL", "echo ruok | nc localhost 2181 || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 10


  kafka:
    image: confluentinc/cp-kafka:7.4.0
    container_name: kafka-broker

    networks:
      - broker-kafka

    depends_on:
      zookeeper:
        condition: service_healthy

    ports:
      - "9092:9092"

    environment:

      KAFKA_BROKER_ID: 1

      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181


      # Kafka escucha dentro del contenedor
      KAFKA_LISTENERS: PLAINTEXT://0.0.0.0:9092


      # Kafka anuncia la dirección que usarán los otros contenedores
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:9092


      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT

      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT


      # Evita errores con topics internos
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_REPLICATION_FACTOR: 1
      KAFKA_TRANSACTION_STATE_LOG_MIN_ISR: 1


      # Permite crear topics automáticamente
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"


    healthcheck:
      test: ["CMD-SHELL", "kafka-broker-api-versions --bootstrap-server localhost:9092"]
      interval: 10s
      timeout: 10s
      retries: 10



  kafdrop:
    image: obsidiandynamics/kafdrop:latest

    container_name: kafka-kafdrop

    networks:
      - broker-kafka

    depends_on:
      kafka:
        condition: service_healthy

    ports:
      - "19000:9000"

    environment:
      KAFKA_BROKERCONNECT: kafka:9092



  producer-service:

    build:
      context: ./str.producer

    container_name: kafka-producer

    networks:
      - broker-kafka

    depends_on:
      kafka:
        condition: service_healthy

    ports:
      - "8000:8000"



networks:

  broker-kafka:
    driver: bridge